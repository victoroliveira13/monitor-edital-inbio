name: Monitor Editais INBIO/UFU

on:
  schedule:
    # Roda todo dia às 08:00 horário de Brasília (11:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch:  # Permite rodar manualmente pelo painel do GitHub

jobs:
  verificar-editais:
    runs-on: ubuntu-latest
    environment: .env
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Salvar estado atualizado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add editais_state.json
          git diff --staged --quiet || git commit -m "chore: atualizar estado dos editais [skip ci]"
          git pull --rebase
          git push
